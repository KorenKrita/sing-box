name: Sync and Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # 每小时执行

env:
  TAGS: "with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_tailscale,with_ccm,badlinkname,tfogo_checklinkname0"
jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许推送到仓库
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Setup Remotes and Force Sync
        run: |
          # 添加代码上游 (reF1nd)
          git remote add upstream https://github.com/reF1nd/sing-box
          echo "Fetching upstream..."
          git fetch upstream
          echo "⚠️ Force resetting code to match upstream/reF1nd-dev..."
          # 强制将本地分支重置为上游最新状态，丢弃本地所有旧历史
          git checkout -B reF1nd-dev upstream/reF1nd-dev
          git reset --hard upstream/reF1nd-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check Version
        id: check_ver
        run: |
          # 计算版本号 (此时能读到 official tags，所以版本号是正确的 v1.13...)
          VERSION=$(CGO_ENABLED=0 go run ./cmd/internal/read_tag)
          echo "Upstream Version: $VERSION"

          # 检查你的仓库(origin)是否已经发布过这个版本
          # 注意：这里改用了 ls-remote origin，只检查你自己的仓库是否已构建过
          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION"; then
            echo "⚠️ Tag $VERSION already exists in YOUR repo. Skipping."
            echo "NEW_VERSION=false" >> $GITHUB_ENV
          else
            echo "✅ New version detected: $VERSION"
            echo "NEW_VERSION=true" >> $GITHUB_ENV
            echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
          fi

      - name: Modify provider.go (Apply Patch)
        if: env.NEW_VERSION == 'true'
        run: |
          echo "Applying patch to provider.go..."
          TARGET_FILE=$(grep -r "a\.providerTag" . -l | head -n 1)

          if [ -z "$TARGET_FILE" ]; then
            echo "❌ Error: Could not find file containing 'a.providerTag'"
            exit 1
          fi
          
          # 执行修改
          sed -i 's#tag = F\.ToString(a\.providerTag, "/", opt\.Tag)#tag = F.ToString(opt.Tag)#g' "$TARGET_FILE"
          
          # 验证修改是否成功
          if grep -q "tag = F.ToString(opt.Tag)" "$TARGET_FILE"; then
            echo "✅ Patch applied successfully."
          else
            echo "❌ Patch failed!"
            exit 1
          fi

      - name: Build Linux AMD64
        if: env.NEW_VERSION == 'true'
        id: build
        run: |
          echo "Building version: ${{ env.BUILD_VERSION }}"
          # 注意：这里编译的是当前磁盘上的文件(已被Patch修改过)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags "${TAGS}" -o sing-box -ldflags "-X \"github.com/sagernet/sing-box/constant.Version=${{ env.BUILD_VERSION }}\" -s -w -buildid= -checklinkname=0" ./cmd/sing-box

      - name: Compress Binary
        if: env.NEW_VERSION == 'true'
        run: |
          zip -9 sing-box-linux-amd64.zip sing-box

      - name: Commit and Push
        if: env.NEW_VERSION == 'true'
        run: |
          git add .
          git commit -m "build: sync upstream ${{ env.BUILD_VERSION }} and patch provider.go"
          
          # 必须使用 --force，因为我们刚才执行了 git reset --hard，重写了历史
          # 这会将你的仓库完全同步为“上游最新代码 + 你的Patch”
          git push origin reF1nd-dev --force

      - name: Create Release
        if: env.NEW_VERSION == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_VERSION }}
          name: Sing-Box ${{ env.BUILD_VERSION }}
          files: sing-box-linux-amd64.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
